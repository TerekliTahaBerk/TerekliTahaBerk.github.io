name: Build GitHub Activity JSON

on:
  schedule:
    # Run once a day at 04:17 UTC (off-peak to avoid GH rate spikes)
    - cron: '17 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/github-activity.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contribution calendar via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: TerekliTahaBerk
        run: |
          set -euo pipefail
          mkdir -p public

          # Window: last ~1 year (GitHub GraphQL allows up to 1 year per query)
          TO_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          FROM_DATE="$(date -u -d '364 days ago' +%Y-%m-%dT%H:%M:%SZ)"

          echo "Window: $FROM_DATE -> $TO_DATE"

          QUERY=$(cat <<'GQL'
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          GQL
          )

          PAYLOAD=$(jq -n \
            --arg query "$QUERY" \
            --arg login "$GH_USERNAME" \
            --arg from "$FROM_DATE" \
            --arg to "$TO_DATE" \
            '{query: $query, variables: {login: $login, from: $from, to: $to}}')

          RESPONSE=$(curl -sS -X POST https://api.github.com/graphql \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          echo "$RESPONSE" | jq -e '.data.user.contributionsCollection.contributionCalendar' > /dev/null || {
            echo "GraphQL response missing calendar data:"
            echo "$RESPONSE"
            exit 1
          }

          echo "$RESPONSE" | jq '[
            .data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[]
            | { date: .date, count: .contributionCount }
          ]' > public/github-activity.json

          echo "Wrote public/github-activity.json ($(jq 'length' public/github-activity.json) days)"

      - name: Mirror to repo root (for GitHub Pages /github-activity.json)
        run: |
          cp public/github-activity.json github-activity.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/github-activity.json github-activity.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh github-activity.json"
            git push
          fi
