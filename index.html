<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taha Berk Terekli</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg" />
<link rel="apple-touch-icon" href="/favicon.jpg" />
  <meta name="description" content="Taha Berk Terekli — mathematics student & data-driven engineer in Istanbul." />
  <meta name="theme-color" content="#0f0e0c" />
  <link rel="canonical" href="https://www.tahaberk.com/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />

  <script>
    // Default to dark; respect user choice if previously set.
    (function () {
      try {
        const saved = localStorage.getItem('tbt_theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    :root {
      --bg:        #f5f2eb;
      --fg:        #15140f;
      --fg-soft:   #4b4740;
      --fg-mute:   #97928a;
      --rule:      #d9d3c4;
      --chip:      #e3decf;
      --hover:     rgba(21, 20, 15, 0.04);
    }
    html.dark {
      --bg:        #0b0a09;
      --fg:        #ece7d8;
      --fg-soft:   #b5ad9c;
      --fg-mute:   #6a655c;
      --rule:      #2b2824;
      --chip:      #1c1a17;
      --hover:     rgba(236, 231, 216, 0.05);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    @media (max-height: 660px), (max-width: 640px) {
      body { overflow: auto; }
    }

    ::selection { background: var(--fg); color: var(--bg); }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px clamp(20px, 4vw, 56px);
      position: relative;
    }

    /* ---------- TOP BAR ---------- */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }
    .brand {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--fg);
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }
    .brand .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: oklch(0.62 0.15 155);
      display: inline-block;
      transform: translateY(-3px);
    }
    .nav-wrap { display: flex; align-items: center; gap: clamp(16px, 2vw, 28px); }
    .nav {
      display: flex;
      gap: clamp(20px, 3vw, 36px);
    }
    .nav a {
      color: var(--fg);
      opacity: 0.65;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.01em;
      position: relative;
      padding: 4px 2px;
      transition: opacity .25s ease;
    }
    .nav a:hover { opacity: 1; }
    .nav a::after {
      content: "";
      position: absolute;
      left: 2px; right: 2px;
      bottom: 0;
      height: 1px;
      background: currentColor;
      transform-origin: left;
      transform: scaleX(0);
      transition: transform .35s cubic-bezier(.2,.7,.2,1);
    }
    .nav a:hover::after { transform: scaleX(1); }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--fg);
      opacity: 0.65;
      border-radius: 999px;
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity .25s ease, border-color .25s ease;
    }
    .theme-toggle:hover { opacity: 1; border-color: var(--fg-soft); }
    .theme-toggle svg { width: 13px; height: 13px; }

    /* ---------- CENTER ---------- */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
      max-width: 620px;
      margin: 0 auto;
      width: 100%;
      padding: 0 8px;
    }
    .center .intro { text-align: left; }

    .hey {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(72px, 13vw, 160px);
      line-height: 0.88;
      letter-spacing: -0.025em;
      margin: 0;
    }

    .live {
      display: inline-flex; align-items: center; gap: 9px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--fg-mute);
      margin-top: 20px;
      text-decoration: none;
    }
    .live:hover .live-link { color: var(--fg-soft); }
    .live .live-link { color: var(--fg-mute); transition: color .3s ease; }
    .live .arrow { opacity: .45; }
    .live .pulse {
      position: relative;
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: oklch(0.66 0.16 152);
      box-shadow: 0 0 6px oklch(0.66 0.16 152 / 0.6);
    }
    .live .pulse::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: oklch(0.66 0.16 152);
      opacity: 0.3;
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.55); opacity: 0.45; }
      100% { transform: scale(2.0);  opacity: 0;    }
    }

    /* ---------- PLUS GRID ---------- */
    .grid {
      --cell: 11px;
      --gap-x: 6px;
      --gap-y: 7px;
      --tone-low:  var(--fg-mute);
      --tone-high: var(--fg);

      margin-top: clamp(22px, 3.4vh, 36px);
      display: grid;
      grid-template-columns: repeat(var(--cols, 22), var(--cell));
      grid-template-rows:    repeat(var(--rows, 8),  var(--cell));
      grid-auto-flow: column;
      gap: var(--gap-y) var(--gap-x);
      width: max-content;
      max-width: 100%;
      /* a faint inner halo to anchor the field as a single object */
      filter: drop-shadow(0 0 0 transparent);
    }
    html.dark .grid {
      --tone-low:  #2f2c27;
      --tone-high: #ece4d2; /* soft warm white */
    }
    .grid svg {
      display: block;
      width: var(--cell);
      height: var(--cell);
      /* per-cell tone interpolated low→high by --tone (0..1) */
      color: color-mix(in oklab, var(--tone-low), var(--tone-high) calc(var(--tone, 0) * 100%));
      opacity: 0;
      transform: translateY(4px) scale(.5);
      transition:
        opacity .9s cubic-bezier(.2,.7,.2,1),
        transform .55s cubic-bezier(.2,.7,.2,1),
        filter .35s ease,
        color .35s ease;
      will-change: opacity, transform;
    }
    .grid svg.in {
      opacity: var(--op, 1);
      transform: scale(var(--scl, 1));
    }
    .grid svg:hover {
      opacity: 1;
      transform: scale(1.45);
      color: var(--tone-high);
      filter: drop-shadow(0 0 5px color-mix(in oklab, var(--tone-high), transparent 35%));
    }

    /* ---------- GRID TOOLTIP ---------- */
    .gh-tip {
      position: fixed;
      z-index: 60;
      pointer-events: none;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10.5px;
      line-height: 1.35;
      color: #ece4d2;
      background: rgba(18, 16, 14, 0.86);
      border: 1px solid rgba(236, 228, 210, 0.09);
      border-radius: 8px;
      padding: 6px 9px;
      letter-spacing: 0.01em;
      white-space: nowrap;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translate(-50%, -2px);
      transition:
        opacity .18s ease,
        transform .22s cubic-bezier(.2,.7,.2,1);
      will-change: opacity, transform;
    }
    .gh-tip.show {
      opacity: 1;
      transform: translate(-50%, -8px);
    }
    .gh-tip .gh-tip-label { display: block; }
    .gh-tip .gh-tip-count {
      display: block;
      margin-top: 2px;
      font-size: 9.5px;
      opacity: 0.55;
      letter-spacing: 0.02em;
    }
    @media (prefers-reduced-motion: reduce) {
      .gh-tip { transition: opacity .12s ease; transform: translate(-50%, -8px); }
    }

    /* ---------- INTRO ---------- */
    .intro {
      margin-top: clamp(20px, 4vh, 36px);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(22px, 2.6vw, 30px);
      line-height: 1.25;
      letter-spacing: -0.005em;
      max-width: 34ch;
      color: var(--fg);
    }
    .w-data       { color: oklch(0.62 0.14 245); }
    .w-automation { color: oklch(0.66 0.14 55);  }
    .w-research   { color: oklch(0.60 0.14 155); }
    .w-ml         { color: oklch(0.62 0.14 10);  }
    html.dark .w-data       { color: oklch(0.78 0.14 245); }
    html.dark .w-automation { color: oklch(0.82 0.14 55);  }
    html.dark .w-research   { color: oklch(0.78 0.14 155); }
    html.dark .w-ml         { color: oklch(0.78 0.14 10);  }

    /* ---------- BOTTOM ---------- */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }
    .meta {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-mute);
    }
    .icons {
      display: flex;
      gap: 10px;
    }
    .icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 999px;
      color: var(--fg);
      opacity: 0.45;
      text-decoration: none;
      transition: opacity .25s ease, background .25s ease, transform .25s ease;
    }
    .icons a:hover {
      opacity: 1;
      background: var(--hover);
      transform: translateY(-1px);
    }
    .icons a svg { width: 15px; height: 15px; }

    a:focus-visible, button:focus-visible {
      outline: 1px dashed var(--fg-soft);
      outline-offset: 3px;
    }

    /* ---------- MOBILE ---------- */
    @media (max-width: 640px) {
      html, body { height: auto; }
      body { overflow-x: hidden; }

      .page {
        padding: 18px 20px 24px;
        min-height: 100svh;
        gap: 0;
      }

      /* Top bar: keep brand + nav + theme on one row, tighter */
      .top {
        flex-wrap: nowrap;
        gap: 10px;
        align-items: center;
      }
      .brand { font-size: 19px; }
      .nav-wrap { gap: 10px; flex-shrink: 0; }
      .nav {
        gap: 14px;
      }
      .nav a {
        font-size: 12px;
        padding: 4px 0;
        opacity: 0.7;
      }
      .theme-toggle {
        width: 28px; height: 28px;
        flex-shrink: 0;
      }

      /* Center: properly balanced vertical rhythm */
      .center {
        padding: 0;
        justify-content: center;
        align-items: flex-start;
        gap: 0;
        padding-top: clamp(24px, 6vh, 56px);
        padding-bottom: clamp(16px, 4vh, 40px);
      }
      .hey {
        font-size: clamp(88px, 28vw, 132px);
        line-height: 0.86;
        letter-spacing: -0.03em;
      }
      .live {
        margin-top: 18px;
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      /* Grid: keep it as a wide, sparse texture that fits the viewport */
      .grid {
        --cell: 9px;
        --gap-x: 4px;
        --gap-y: 5px;
        margin-top: 28px;
        margin-left: -2px; /* small visual bleed for balance */
      }

      .intro {
        margin-top: 28px;
        font-size: clamp(22px, 6vw, 28px);
        line-height: 1.25;
        max-width: 22ch;
      }

      /* Bottom: keep on a single line — meta left, icons right */
      .bottom {
        flex-wrap: nowrap;
        gap: 12px;
        margin-top: clamp(18px, 4vh, 32px);
      }
      .meta {
        font-size: 9px;
        letter-spacing: 0.18em;
      }
      .icons { gap: 6px; }
      .icons a {
        width: 30px; height: 30px;
        opacity: 0.55;
      }
      .icons a svg { width: 15px; height: 15px; }
    }

    /* Tighten for the smallest phones */
    @media (max-width: 380px) {
      .page { padding: 16px 16px 20px; }
      .nav { gap: 11px; }
      .nav a { font-size: 11.5px; }
      .brand { font-size: 18px; }
      .hey { font-size: clamp(76px, 26vw, 108px); }
      .grid {
        --cell: 7.5px;
        --gap-x: 3px;
        --gap-y: 4px;
      }
      .intro { font-size: 20px; }
      .meta { letter-spacing: 0.14em; }
    }

    /* Very short screens — make sure everything still breathes */
    @media (max-width: 640px) and (max-height: 700px) {
      .center {
        padding-top: 20px;
        padding-bottom: 16px;
      }
      .hey { font-size: clamp(72px, 22vw, 104px); }
      .grid { margin-top: 18px; }
      .intro { margin-top: 18px; }
    }
  </style>

  <script>
    /* ---------- Theme toggle ---------- */
    const themeBtn  = document.getElementById('theme');
    const themeIcon = document.getElementById('theme-icon');
    const SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
    const MOON = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
    const syncIcon = () => {
      themeIcon.innerHTML = document.documentElement.classList.contains('dark') ? SUN : MOON;
    };
    syncIcon();
    themeBtn.addEventListener('click', () => {
      const root = document.documentElement;
      root.classList.toggle('dark');
      try { localStorage.setItem('tbt_theme', root.classList.contains('dark') ? 'dark' : 'light'); } catch {}
      syncIcon();
    });

    /* ---------- GitHubActivityGrid ----------
       A decorative plus-sign field that softly reacts to recent GitHub
       activity. Deterministic mock data is rendered immediately; a
       statically-generated JSON file (built daily by a GitHub Action)
       is then quietly overlaid. If the JSON is unavailable the field
       keeps its mock data and the status line flips to "offline".
    ----------------------------------------------------------------- */
    function GitHubActivityGrid({
      mount,
      username,
      cols = 22,
      rows = 8,
    }) {
      const SVG_NS = 'http://www.w3.org/2000/svg';
      mount.style.setProperty('--cols', cols);
      mount.style.setProperty('--rows', rows);

      // ---- tooltip (single shared node) ----------------------------
      let tipEl = document.querySelector('.gh-tip');
      if (!tipEl) {
        tipEl = document.createElement('div');
        tipEl.className = 'gh-tip';
        tipEl.setAttribute('role', 'tooltip');
        tipEl.innerHTML = '<span class="gh-tip-label"></span><span class="gh-tip-count"></span>';
        document.body.appendChild(tipEl);
      }
      const tipLabel = tipEl.querySelector('.gh-tip-label');
      const tipCount = tipEl.querySelector('.gh-tip-count');

      function labelFor(count) {
        if (count <= 0)  return 'quiet day';
        if (count === 1) return 'one tiny spark';
        if (count <= 3)  return 'a few sparks';
        if (count <= 7)  return 'busy little day';
        if (count <= 12) return 'commit weather: active';
        return 'tiny storm of commits';
      }

      function showTip(svg, cell) {
        const count = cell.count | 0;
        tipLabel.textContent = labelFor(count);
        tipCount.textContent = count === 1 ? '1 commit' : `${count} commits`;
        // Position above the cell, centered.
        const r = svg.getBoundingClientRect();
        tipEl.style.left = `${r.left + r.width / 2}px`;
        tipEl.style.top  = `${r.top}px`;
        tipEl.classList.add('show');
      }
      function hideTip() {
        tipEl.classList.remove('show');
      }

      // ---- intensity → visual mapping ------------------------------
      // Plus signs vary by opacity, tone (color mix) and a *very* subtle
      // scale. Low activity ≈ almost invisible gray. High ≈ soft warm white.
      function styleFromIntensity(v) {
        const x = Math.max(0, Math.min(1, v));
        // Strong floor so low cells barely register, gentle ceiling so the
        // field never feels punchy or developer-dashboard-like.
        const op   = 0.06 + Math.pow(x, 1.25) * 0.86;
        const tone = Math.pow(x, 1.4);              // 0..1, biased dark
        const scl  = 0.86 + x * 0.18;               // 0.86..1.04
        return { op, tone, scl };
      }

      function makePlus(v) {
        const { op, tone, scl } = styleFromIntensity(v);
        const svg = document.createElementNS(SVG_NS, 'svg');
        svg.setAttribute('viewBox', '0 0 14 14');
        svg.setAttribute('aria-hidden', 'true');
        svg.style.setProperty('--op',   op);
        svg.style.setProperty('--tone', tone);
        svg.style.setProperty('--scl',  scl);
        const path = document.createElementNS(SVG_NS, 'path');
        path.setAttribute('d', 'M7 2.5 L7 11.5 M2.5 7 L11.5 7');
        path.setAttribute('stroke', 'currentColor');
        path.setAttribute('stroke-width', '1.4');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
        return svg;
      }

      function applyStyle(svg, v) {
        const { op, tone, scl } = styleFromIntensity(v);
        svg.style.setProperty('--op',   op);
        svg.style.setProperty('--tone', tone);
        svg.style.setProperty('--scl',  scl);
        if (svg.classList.contains('in')) {
          svg.style.opacity = op;
        }
      }

      // ---- date axis (oldest top-left → newest bottom-right) -------
      const totalDays = cols * rows;
      const today = new Date();
      const todayUTC = new Date(Date.UTC(
        today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate()
      ));
      const firstDay = new Date(todayUTC.getTime() - (totalDays - 1) * 86400000);
      function dateForIndex(i) {
        return new Date(firstDay.getTime() + i * 86400000);
      }

      // Plausible mock commit count derived deterministically from intensity.
      // Keeps the field cohesive when GitHub data is missing.
      function mockCountFromIntensity(v) {
        return Math.round(Math.pow(Math.max(0, Math.min(1, v)), 1.6) * 14);
      }

      // ---- deterministic mock field --------------------------------
      // Smooth low-frequency noise so the field reads as texture rather
      // than random dots. Recency lifts the right side just slightly.
      function buildMock(seed) {
        let r = seed >>> 0;
        const rand = () => {
          r = (r * 1664525 + 1013904223) >>> 0;
          return (r & 0xffffffff) / 0x100000000;
        };
        const data = new Array(cols * rows);
        for (let c = 0; c < cols; c++) {
          for (let row = 0; row < rows; row++) {
            const recency = c / Math.max(1, cols - 1);          // 0..1
            const wave =
              0.18 * Math.sin(c * 0.55 + row * 0.85) +
              0.12 * Math.sin(c * 0.21 - row * 0.33 + 1.1);
            const noise = rand() * 0.45;
            let v = 0.22 + noise + wave + recency * 0.22;
            // sprinkle voids so the field has breathing room
            if (rand() < 0.18) v *= 0.15;
            v = Math.max(0, Math.min(1, v));
            const idx = c * rows + row;
            data[idx] = {
              intensity: v,
              count: mockCountFromIntensity(v),
              date: dateForIndex(idx),
            };
          }
        }
        return data;
      }

      // ---- render + diagonal stagger reveal ------------------------
      function render(data) {
        mount.innerHTML = '';
        const nodes = new Array(data.length);
        for (let i = 0; i < data.length; i++) {
          const cell = data[i];
          const svg = makePlus(cell.intensity);
          // bind hover tooltip
          svg.addEventListener('mouseenter', () => showTip(svg, data[i]));
          svg.addEventListener('mouseleave', hideTip);
          mount.appendChild(svg);
          nodes[i] = svg;
        }
        // Diagonal wave reveal — calm, premium, not dramatic.
        for (let i = 0; i < nodes.length; i++) {
          const col = Math.floor(i / rows);
          const row = i % rows;
          const delay = 180 + col * 22 + row * 14;
          setTimeout(() => nodes[i].classList.add('in'), delay);
        }
        return nodes;
      }

      // Hide tooltip on scroll/resize so it never floats away from its cell.
      const onDismiss = () => hideTip();
      window.addEventListener('scroll', onDismiss, { passive: true });
      window.addEventListener('resize', onDismiss);

      // ---- 1) instant mock paint -----------------------------------
      const data  = buildMock(0x9e3779b1);
      const nodes = render(data);

      // ---- 2) silent overlay from statically-built JSON -----------
      // The JSON is produced daily by .github/workflows/github-activity.yml
      // and committed to the repo. We try a couple of likely paths so the
      // site works both at the repo root and when served from /public.
      (async () => {
        const candidates = [
          '/github-activity.json',
          'github-activity.json',
          'public/github-activity.json',
        ];
        let days = null;
        for (const url of candidates) {
          try {
            const res = await fetch(url, { cache: 'no-cache' });
            if (!res.ok) continue;
            const json = await res.json();
            if (Array.isArray(json) && json.length > 0) {
              days = json;
              break;
            }
          } catch (_) { /* try next */ }
        }

        const label = document.getElementById('live-label');

        if (!days) {
          if (label) label.textContent = 'offline · sample activity';
          return;
        }

        // Bucket counts by ISO date (YYYY-MM-DD)
        const byDay = Object.create(null);
        let maxCount = 0;
        for (const d of days) {
          if (!d || typeof d.date !== 'string') continue;
          const c = Number(d.count) || 0;
          byDay[d.date] = c;
          if (c > maxCount) maxCount = c;
        }

        const denom = Math.log2(1 + Math.max(maxCount, 2));

        for (let d = 0; d < totalDays; d++) {
          const iso = dateForIndex(d).toISOString().slice(0, 10);
          const count = byDay[iso] || 0;
          // Always record the real count on the cell, even when 0,
          // so tooltips reflect reality once data has loaded.
          data[d].count = count;
          // Map real counts to intensity (log-scaled), replacing mock.
          const intensity = count > 0
            ? Math.min(1, 0.18 + (Math.log2(1 + count) / denom) * 0.82)
            : 0.05;
          data[d].intensity = intensity;
          applyStyle(nodes[d], intensity);
        }

        if (label) label.textContent = 'live · github activity';
      })();
    }

    GitHubActivityGrid({
      mount: document.getElementById('grid'),
      username: 'TerekliTahaBerk',
      cols: 22,
      rows: 8,
    });
  </script>
</body>
</html>
