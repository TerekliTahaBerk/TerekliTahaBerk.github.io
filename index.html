<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taha Berk — building with data, automation, research and ML</title>
  <meta name="description" content="Taha Berk Terekli — mathematics student & data-driven engineer in Istanbul." />
  <meta name="theme-color" content="#0f0e0c" />
  <link rel="canonical" href="https://www.tahaberk.com/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />

  <script>
    // Default to dark; respect user choice if previously set.
    (function () {
      try {
        const saved = localStorage.getItem('tbt_theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    :root {
      --bg:        #f5f2eb;
      --fg:        #15140f;
      --fg-soft:   #4b4740;
      --fg-mute:   #97928a;
      --rule:      #d9d3c4;
      --chip:      #e3decf;
      --hover:     rgba(21, 20, 15, 0.04);
    }
    html.dark {
      --bg:        #0b0a09;
      --fg:        #ece7d8;
      --fg-soft:   #b5ad9c;
      --fg-mute:   #6a655c;
      --rule:      #2b2824;
      --chip:      #1c1a17;
      --hover:     rgba(236, 231, 216, 0.05);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    @media (max-height: 660px), (max-width: 520px) {
      body { overflow: auto; }
    }

    ::selection { background: var(--fg); color: var(--bg); }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px clamp(20px, 4vw, 56px);
      position: relative;
    }

    /* ---------- TOP BAR ---------- */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }
    .brand {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--fg);
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }
    .brand .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: oklch(0.62 0.15 155);
      display: inline-block;
      transform: translateY(-3px);
    }
    .nav-wrap { display: flex; align-items: center; gap: clamp(16px, 2vw, 28px); }
    .nav {
      display: flex;
      gap: clamp(20px, 3vw, 36px);
    }
    .nav a {
      color: var(--fg);
      opacity: 0.65;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.01em;
      position: relative;
      padding: 4px 2px;
      transition: opacity .25s ease;
    }
    .nav a:hover { opacity: 1; }
    .nav a::after {
      content: "";
      position: absolute;
      left: 2px; right: 2px;
      bottom: 0;
      height: 1px;
      background: currentColor;
      transform-origin: left;
      transform: scaleX(0);
      transition: transform .35s cubic-bezier(.2,.7,.2,1);
    }
    .nav a:hover::after { transform: scaleX(1); }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--fg);
      opacity: 0.65;
      border-radius: 999px;
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity .25s ease, border-color .25s ease;
    }
    .theme-toggle:hover { opacity: 1; border-color: var(--fg-soft); }
    .theme-toggle svg { width: 13px; height: 13px; }

    /* ---------- CENTER ---------- */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 0 8px;
    }
    .center .intro { text-align: center; }

    .hey {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(72px, 13vw, 160px);
      line-height: 0.88;
      letter-spacing: -0.025em;
      margin: 0;
    }

    .live {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-mute);
      margin-top: 18px;
      text-decoration: none;
    }
    .live:hover .live-link { color: var(--fg); }
    .live .live-link { color: var(--fg-mute); transition: color .25s ease; }
    .live .pulse {
      position: relative;
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: oklch(0.62 0.15 155);
    }
    .live .pulse::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: oklch(0.62 0.15 155);
      opacity: 0.35;
      animation: pulse 1.8s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.6); opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    /* ---------- PLUS GRID ---------- */
    .grid {
      margin-top: clamp(20px, 3.5vh, 36px);
      display: grid;
      grid-template-columns: repeat(var(--cols, 22), 1fr);
      gap: 7px 8px;
      width: 100%;
      max-width: 560px;
    }
    .grid svg {
      display: block;
      color: var(--fg);
      opacity: 0;
      transform: translateY(3px) scale(.55);
      transition:
        opacity .65s cubic-bezier(.2,.7,.2,1),
        transform .35s cubic-bezier(.2,.7,.2,1),
        color .25s ease;
      cursor: default;
    }
    .grid svg.in {
      opacity: var(--op, 1);
      transform: none;
    }
    .grid svg:hover {
      opacity: 1 !important;
      transform: scale(1.25);
    }

    /* ---------- INTRO ---------- */
    .intro {
      margin-top: clamp(20px, 4vh, 36px);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(22px, 2.6vw, 30px);
      line-height: 1.25;
      letter-spacing: -0.005em;
      max-width: 34ch;
      color: var(--fg);
    }
    .w-data       { color: oklch(0.62 0.14 245); }
    .w-automation { color: oklch(0.66 0.14 55);  }
    .w-research   { color: oklch(0.60 0.14 155); }
    .w-ml         { color: oklch(0.62 0.14 10);  }
    html.dark .w-data       { color: oklch(0.78 0.14 245); }
    html.dark .w-automation { color: oklch(0.82 0.14 55);  }
    html.dark .w-research   { color: oklch(0.78 0.14 155); }
    html.dark .w-ml         { color: oklch(0.78 0.14 10);  }

    /* ---------- BOTTOM ---------- */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }
    .meta {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-mute);
    }
    .icons {
      display: flex;
      gap: 10px;
    }
    .icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 999px;
      color: var(--fg);
      opacity: 0.45;
      text-decoration: none;
      transition: opacity .25s ease, background .25s ease, transform .25s ease;
    }
    .icons a:hover {
      opacity: 1;
      background: var(--hover);
      transform: translateY(-1px);
    }
    .icons a svg { width: 15px; height: 15px; }

    a:focus-visible, button:focus-visible {
      outline: 1px dashed var(--fg-soft);
      outline-offset: 3px;
    }
  </style>
</head>
<body>

          </svg>

        <a href="https://www.linkedin.com/in/tahaberkterekli" target="_blank" rel="noreferrer" aria-label="LinkedIn" title="LinkedIn">

        <a href="mailto:contact@tahaberk.com" aria-label="Email" title="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

  <script>
    /* ---------- Theme toggle ---------- */
    const themeBtn  = document.getElementById('theme');
    const themeIcon = document.getElementById('theme-icon');
    const SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
    const MOON = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
    const syncIcon = () => {
      themeIcon.innerHTML = document.documentElement.classList.contains('dark') ? SUN : MOON;
    };
    syncIcon();
    themeBtn.addEventListener('click', () => {
      const root = document.documentElement;
      root.classList.toggle('dark');
      try { localStorage.setItem('tbt_theme', root.classList.contains('dark') ? 'dark' : 'light'); } catch {}
      syncIcon();
    });

    /* ---------- Plus grid ---------- */
    const COLS = 22, ROWS = 7;
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const grid = document.getElementById('grid');
    grid.style.setProperty('--cols', COLS);

    function buildMock(seed) {
      let r = seed;
      const rand = () => (r = (r * 9301 + 49297) % 233280) / 233280;
      const cells = [];
      for (let i = 0; i < COLS * ROWS; i++) {
        const col = Math.floor(i / ROWS);
        const recency = col / (COLS - 1);
        const v = Math.max(0, Math.min(1,
          0.18 + rand() * 0.55 + recency * 0.32 +
          (Math.sin(col * 0.6 + (i % ROWS) * 0.9) * 0.1)
        ));
        cells.push(rand() < 0.2 ? 0 : v);
      }
      return cells;
    }

    function makePlus(op) {
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('viewBox', '0 0 14 14');
      svg.setAttribute('width', '13');
      svg.setAttribute('height', '13');
      svg.style.setProperty('--op', op);
      const path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('d', 'M7 2.5 L7 11.5 M2.5 7 L11.5 7');
      path.setAttribute('stroke', 'currentColor');
      path.setAttribute('stroke-width', '1.4');
      path.setAttribute('stroke-linecap', 'round');
      svg.appendChild(path);
      return svg;
    }

    function renderGrid(values) {
      grid.innerHTML = '';
      const plusElems = [];
      for (let i = 0; i < values.length; i++) {
        const v = values[i];
        const op = v === 0 ? 0.05 : 0.14 + v * 0.82;
        const svg = makePlus(op);
        grid.appendChild(svg);
        plusElems.push(svg);
      }
      plusElems.forEach((svg, i) => {
        const col = Math.floor(i / ROWS);
        const row = i % ROWS;
        const delay = col * 26 + row * 14;
        setTimeout(() => svg.classList.add('in'), 140 + delay);
      });
      return plusElems;
    }

    // Initial render with mock so the grid never looks empty
    let values = buildMock(7);
    renderGrid(values);

    /* ---------- Real GitHub contributions ---------- */
    const liveLabel = document.getElementById('live-label');

    async function loadContributions() {
      // Public proxy returning the real GitHub contribution calendar (no auth).
      const r = await fetch('https://github-contributions-api.jogruber.de/v4/TerekliTahaBerk?y=last');
      if (!r.ok) throw new Error('contrib http ' + r.status);
      const data = await r.json();
      if (!data || !Array.isArray(data.contributions)) throw new Error('no contrib');

      // Build the last COLS weeks ending today (Mon..Sun rows).
      const map = Object.create(null);
      for (const d of data.contributions) map[d.date] = d.count;

      const today = new Date();
      const todayUTC = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate()));
      // Anchor to the most recent Sunday so a full week fits the rightmost column.
      const dowToday = todayUTC.getUTCDay(); // 0=Sun..6=Sat
      const daysToSun = (7 - dowToday) % 7;
      const anchor = new Date(todayUTC.getTime() + daysToSun * 86400000);

      const totalDays = COLS * 7;
      const out = new Array(COLS * ROWS).fill(0);
      let maxCount = 0;

      for (let d = 0; d < totalDays; d++) {
        const date = new Date(anchor.getTime() - (totalDays - 1 - d) * 86400000);
        const iso = date.toISOString().slice(0, 10);
        const count = map[iso] || 0;
        if (count > maxCount) maxCount = count;
        // Column 0 = oldest week, ROWS rows Mon..Sun (0..6)
        const dow = (date.getUTCDay() + 6) % 7; // Mon=0..Sun=6
        const col = Math.floor(d / 7);
        if (dow < ROWS) {
          out[col * ROWS + dow] = count;
        }
      }

      // Normalize counts to 0..1 with a soft log curve so a 1-commit day is still visible.
      const norm = out.map(c => {
        if (c <= 0) return 0;
        return Math.min(1, 0.25 + Math.log2(1 + c) / Math.log2(1 + Math.max(maxCount, 4)) * 0.85);
      });
      return { values: norm, total: data.total && data.total.lastYear };
    }

    async function loadLastEvent() {
      const r = await fetch('https://api.github.com/users/TerekliTahaBerk/events/public?per_page=10', {
        headers: { Accept: 'application/vnd.github+json' },
      });
      if (!r.ok) throw new Error('events http ' + r.status);
      const events = await r.json();
      if (!Array.isArray(events) || events.length === 0) throw new Error('no events');
      const last = events[0];
      const when = new Date(last.created_at);
      const diffMin = Math.max(1, Math.round((Date.now() - when.getTime()) / 60000));
      return diffMin < 60   ? `${diffMin}m ago` :
             diffMin < 1440 ? `${Math.round(diffMin/60)}h ago` :
                              `${Math.round(diffMin/1440)}d ago`;
    }

    (async () => {
      let liveOk = false;
      try {
        const { values: real } = await loadContributions();
        renderGrid(real);
        liveOk = true;
      } catch (e) { /* keep mock */ }

      try {
        const rel = await loadLastEvent();
        liveLabel.textContent = liveOk
          ? `live · updated ${rel} · github`
          : `offline · last seen ${rel} · github`;
      } catch (e) {
        liveLabel.textContent = liveOk
          ? `live · github`
          : `offline · mock activity · github`;
      }
    })();
  </script>
</body>
</html>
